name: Publish Extensions

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      store:
        description: "Store to publish (chrome / firefox / edge / all)"
        required: true
        default: all
        type: choice
        options:
          - all
          - chrome
          - firefox
          - edge

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24.x

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          npm install
          npm run version
          npm run release

      - name: Create zip archives
        run: |
          cd release/chrome  && zip -r ../chrome-${{ steps.version.outputs.version }}.zip .  && cd ../..
          cd release/firefox && zip -r ../firefox-${{ steps.version.outputs.version }}.zip . && cd ../..
          cd release/edge    && zip -r ../edge-${{ steps.version.outputs.version }}.zip .    && cd ../..

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          name: Xtense ${{ steps.version.outputs.version }}
          draft: false
          artifacts: "release/chrome-${{ steps.version.outputs.version }}.zip,release/firefox-${{ steps.version.outputs.version }}.zip,release/edge-${{ steps.version.outputs.version }}.zip"
          artifactContentType: zip
          body: "Release officielle ${{ steps.version.outputs.version }}"
          tag: "${{ steps.version.outputs.version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: |
            release/chrome-${{ steps.version.outputs.version }}.zip
            release/firefox-${{ steps.version.outputs.version }}.zip
            release/edge-${{ steps.version.outputs.version }}.zip
          retention-days: 1

  publish-chrome:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || github.event.inputs.store == 'all' || github.event.inputs.store == 'chrome' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: release/

      - name: Publish to Chrome Web Store
        uses: PlasmoHQ/bpp@v3
        with:
          keys: >-
            {
              "chrome": {
                "clientId": "${{ secrets.CHROME_CLIENT_ID }}",
                "clientSecret": "${{ secrets.CHROME_CLIENT_SECRET }}",
                "refreshToken": "${{ secrets.CHROME_REFRESH_TOKEN }}",
                "extId": "${{ secrets.CHROME_EXTENSION_ID }}",
                "zip": "release/chrome-${{ needs.build.outputs.version }}.zip"
              }
            }

  publish-firefox:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || github.event.inputs.store == 'all' || github.event.inputs.store == 'firefox' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: release/

      - name: Publish to Firefox Add-ons
        uses: PlasmoHQ/bpp@v3
        with:
          keys: >-
            {
              "firefox": {
                "extId": "${{ secrets.FIREFOX_ADDON_UUID }}",
                "apiKey": "${{ secrets.FIREFOX_API_KEY }}",
                "apiSecret": "${{ secrets.FIREFOX_API_SECRET }}",
                "zip": "release/firefox-${{ needs.build.outputs.version }}.zip"
              }
            }

  publish-edge:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || github.event.inputs.store == 'all' || github.event.inputs.store == 'edge' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: release/

      - name: Publish to Edge Add-ons
        uses: PlasmoHQ/bpp@v3
        with:
          keys: >-
            {
              "edge": {
                "clientId": "${{ secrets.EDGE_CLIENT_ID }}",
                "apiKey": "${{ secrets.EDGE_API_KEY }}",
                "productId": "${{ secrets.EDGE_PRODUCT_ID }}",
                "zip": "release/edge-${{ needs.build.outputs.version }}.zip"
              }
            }
